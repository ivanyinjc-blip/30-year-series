}
.container { max-width: 900px; margin: 0 auto; }

.stat-block span { font-size: 12px; color: #9fa8da; }
.ending-list {

  margin-top: 12px;
}
.ending-item {

  border-radius: 6px;

.ending-item.bad { border-left-color: #ff5252; }

.stat-value.bad { color: #ff5252; }
.soft-stats {

  padding: 12px;

  background: rgba(206,147,216,0.2);
  color: #ce93d8;
  padding: 2px 8px;
  border-radius: 10px;
  margin-right: 8px;
}

.log-year { color: #ffd54f; font-weight: bold; }
.log-sidequest { color: #ce93d8; }
.ending-screen {

.ending-title { font-size: 32px; color: #ffd54f; margin-bottom: 16px; }
.ending-desc { font-size: 16px; line-height: 1.8; color: #e8eaf6; }
.ending-stats { margin-top: 20px; font-size: 14px; color: #ffcdd2; }

  background: #ffd54f;
  color: #1a0e27;
  border: none;
  border-radius: 6px;

@media (max-width: 600px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .ending-list { grid-template-columns: 1fr; }

}

    _mainDone: false
  };
}

function pick3(arr) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 3);
}

function updateState(changes) {
  if (!changes) return;
  Object.keys(changes).forEach(k => {
    if (changes[k] === undefined || changes[k] === null) return;
    state[k] = (state[k] || 0) + changes[k];
  });
  // 软指标 clamp 0-150
  ['health','family','social'].forEach(k => {
    if (state[k] > 150) state[k] = 150;
    if (state[k] < 0) state[k] = 0;
  });
  // 硬指标 clamp
  if (state.deposits < 0) state.deposits = 0;
  if (state.npl < 0) state.npl = 0;
  if (state.npl > 5) state.npl = 5;
  if (state.political < 0) state.political = 0;
  if (state.political > 100) state.political = 100;
  // 评级重算:0=3C, 1=3B, 2=1A, 3=2B, 4=2A, 5=3A
  // 评级越高数字越大
  let newRating;
  if (state.deposits >= 1000 && state.npl < 1) newRating = 6;
  else if (state.deposits >= 500 && state.npl < 1.5) newRating = 5;
  else if (state.deposits >= 100 && state.npl < 2) newRating = 4;
  else if (state.deposits >= 50 && state.npl < 2.5) newRating = 3;
  else if (state.deposits >= 10 && state.npl < 3) newRating = 2;
  else if (state.deposits >= 3) newRating = 1;
  else newRating = 0;
  state.rating = newRating;
  if (typeof renderStats === 'function') renderStats();
}

function ratingLabel(r) {
  const labels = ['3C 客户经理', '3B 部门经理', '1A 支行长', '2B 省分行副总', '2A 省分行行长', '3A 总行 VP', '3A+ 总行行长'];
  return labels[r] || '3C 客户经理';
}

function addLog(html, type) {
  state.log.push({ year: state.year, html, type: type || "" });
  const logEl = document.getElementById("log");
  logEl.innerHTML = state.log.map(e => `<div class="log-entry"><span class="log-year">${e.year}</span> · ${e.type === 'sidequest' ? '<span class="log-sidequest">🌟</span> ' : ''}${e.html}</div>`).join("");
  logEl.scrollTop = logEl.scrollHeight;
}

function rollOutcome(project) {
  const r = Math.random();
  if (r < project.rate * 0.4) return { key: "huge", label: "🟢 hugeSuccess", text: project.outs.huge };
  if (r < project.rate) return { key: "moderate", label: "🔵 moderateSuccess", text: project.outs.moderate };
  if (r < project.rate + 0.3) return { key: "breakeven", label: "🟡 breakeven", text: project.outs.breakeven };
  return { key: "failure", label: "🔴 failure", text: project.outs.failure };
}

function applyOutcome(outcome, project) {
  let effStr = "";
  if (outcome.key === "huge") { effStr = "💰 存款 x" + project.mult; state.deposits *= project.mult; }
  else if (outcome.key === "moderate") { effStr = "💰 存款 x" + (project.mult * 0.5).toFixed(1); state.deposits *= (project.mult * 0.5); }
  else if (outcome.key === "breakeven") { effStr = "💰 存款 持平"; }
  else { effStr = "💰 存款 x0.5 (损失)"; state.deposits *= 0.5; state.npl += 0.5; }
  state.projectResults.push({ year: state.year, project: project.name, real: project.real, outcome: outcome.label, mult: outcome.key === "huge" ? project.mult : outcome.key === "moderate" ? project.mult * 0.5 : outcome.key === "breakeven" ? 1 : 0.5 });
  return effStr;
}

  safeSet("npl", state.npl.toFixed(1) + "%");

  safeSet("political", state.political);
  safeSet("health-val", state.health);
  safeSet("family-val", state.family);
  safeSet("social-val", state.social);
  const setBar = (id, v) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.width = Math.min(100, v * 0.67) + "%";
    el.style.background = v > 90 ? "#ffd54f" : v > 60 ? "#ff8a65" : "#ff5252";
  };
  setBar("health-bar", state.health);
  setBar("family-bar", state.family);
  setBar("social-bar", state.social);
  const pol = document.getElementById("political");
  if (pol) pol.className = "stat-value " + (state.political < 30 ? "bad" : state.political < 60 ? "warn" : "");
}

    ${renderEraBanner()}
    <div class="intensity-card">
      <div class="card-title">⚙️ 投入度 · 3 选 1</div>
      <div class="card-desc">本回合你打算多拼?</div>
      <div class="choices">
        <button class="choice" onclick="chooseIntensity('a')"><span class="choice-tag">A</span>996 极限<span class="choice-eff">存款+10%, Health-5, 不良率+0.3%, Family-3</span></button>
        <button class="choice" onclick="chooseIntensity('b')"><span class="choice-tag">B</span>8h 平衡<span class="choice-eff">存款+3%, Health-2</span></button>
        <button class="choice" onclick="chooseIntensity('c')"><span class="choice-tag">C</span>摆烂<span class="choice-eff">存款-3%, Health+5, 政治资本-3, Family+3</span></button>
      </div>
    </div>
  `;
}

function renderSideQuest() {
  const sq = state.pendingSideQuest;
  clearGameArea();
  document.getElementById("game-area").innerHTML = `
    ${renderStatsBar()}
    ${renderEraBanner()}
    <div class="sidequest-card">
      <div class="card-title">${sq.title} <span class="side-quest-badge">🌟 支线 ${state.sideQuestsDone.length+1}/5</span></div>
      <div class="card-desc">${sq.desc}</div>
      <div class="choices">
        ${sq.choices.map((c, i) => `
          <button class="choice" onclick="chooseSideQuest(${i})">
            <span class="choice-tag">${String.fromCharCode(65+i)}</span>${c.text}
            <span class="choice-eff">${c.eff}</span>
          </button>
        `).join("")}
      </div>
    </div>
  `;
}

function renderResult(outcome, project) {
  clearGameArea();
  document.getElementById("game-area").innerHTML = `
    ${renderStatsBar()}
    ${renderEraBanner()}
    <div class="event-card">
      <div class="card-title">📊 ${state.year} 年终结算</div>
      <div class="card-desc">
        <strong>${project.name} (${project.real})</strong> → ${outcome.label}<br>
        <em>${outcome.text}</em>
      </div>
      <div style="margin: 12px 0; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 6px; font-size: 13px;">
        <div>💰 存款: ${state.deposits.toFixed(1)} 亿 | 不良率: ${state.npl.toFixed(1)}% | 监管评级: ${ratingLabel(state.rating)}</div>
        <div>📈 政治资本: ${state.political}</div>
        <div>❤️ Health: ${state.health} | 👪 Family: ${state.family} | 🤝 Social: ${state.social}</div>
      </div>
      <button class="choice" onclick="nextRound()" style="text-align:center; background: rgba(255,213,79,0.2);">进入下一年 →</button>
    </div>
  `;
}

function renderEnding(ending) {
  clearGameArea();
  document.getElementById("game-area").innerHTML = `
    <div class="ending-screen">
      <div class="ending-title">${ending.title}</div>
      <div class="ending-desc">${ending.desc}</div>
      <div class="ending-stats">
        <div>📅 ${state.year} 年 · ${state.age} 岁 · 30 年银行路</div>
        <div>💰 最终存款: ${state.deposits.toFixed(1)} 亿 | 不良率: ${state.npl.toFixed(1)}%</div>
        <div>📈 监管评级: ${ratingLabel(state.rating)} | 政治资本: ${state.political}</div>
        <div>❤️ Health: ${state.health} | 👪 Family: ${state.family} | 🤝 Social: ${state.social}</div>
        <div>🌟 完成支线: ${state.sideQuestsDone.length}/5</div>
        <div style="margin-top:12px;">📜 30 年足迹:</div>
        <div style="text-align:left; margin-top:8px; max-height:200px; overflow-y:auto; font-size:13px;">
          ${state.projectResults.map(r => `<div>· ${r.year} ${r.project} (${r.real}) → ${r.outcome} x${r.mult.toFixed(1)}</div>`).join("")}
        </div>
      </div>
      <button class="restart-btn" onclick="restart()">🔄 重新开始 30 年银行路</button>
    </div>
  `;
}

function checkSideQuest() {
  const sq = SIDE_QUESTS.find(s => s.year === state.year && !state.sideQuestsDone.find(d => d.year === s.year));
  if (sq) {
    state.pendingSideQuest = sq;
    state.phase = "sidequest";
    return true;
  }
  state.phase = "event";
  return false;
}

window.startGame = function() {
  document.getElementById("log").style.display = "block";
  state = initState();
  window.state = state;
  addLog("📜 <strong>1995 年</strong> · 你 22 岁,入行工行某支行做柜员");
  checkSideQuest();
  if (state.phase === "sidequest") {
    renderSideQuest();
  } else {
    state.pendingEvent = EVENTS[1][0];
    state._mainDone = false;
    renderEvent();
  }
};

window.chooseEvent = function(key) {
  const ev = state.pendingEvent;
  const choice = ev[key];
  updateState({
    deposits: choice.deposits||0,
    npl: choice.npl||0,
    political: choice.political||0,
    health: choice.health||0,
    family: choice.family||0,
    social: choice.social||0
  });
  addLog(`📰 时代事件 → <strong>${choice.text}</strong> (${choice.eff})`);
  state.pendingProject = pick3(PROJECTS[state.era]);
  state.phase = "project";
  renderProject();
};

window.chooseProject = function(idx) {
  const project = state.pendingProject[idx];
  state._currentProject = project;
  state.phase = "intensity";
  addLog(`💼 选择了 <strong>${project.name}</strong> (${project.real})`);
  renderIntensity();
};

window.chooseIntensity = function(key) {
  let changes = {};
  if (key === 'a') changes = { deposits: state.deposits * 0.1, health: -5, npl: 0.3, family: -3 };
  else if (key === 'b') changes = { deposits: state.deposits * 0.03, health: -2 };
  else changes = { deposits: state.deposits * -0.03, health: 5, political: -3, family: 3 };
  updateState(changes);
  addLog(`⚙️ 投入度: ${key === 'a' ? '996 极限' : key === 'b' ? '8h 平衡' : '摆烂'}`);
  const project = state._currentProject;
  const outcome = rollOutcome(project);
  const effStr = applyOutcome(outcome, project);
  addLog(`📊 <strong>${project.name}</strong> → ${outcome.label} · ${effStr}`);
  state._mainDone = true;
  state.phase = "result";
  renderResult(outcome, project);
};

window.chooseSideQuest = function(idx) {
  const sq = state.pendingSideQuest;
  const choice = sq.choices[idx];
  if (choice.gamble) {
    const won = Math.random() < 0.6;
    if (won) {
      addLog(`🌟 支线:${choice.text} <strong style="color:#ffd54f;">【赌赢了!】</strong>`, "sidequest");
      const winChanges = {};
      Object.keys(choice.changes).forEach(k => { winChanges[k] = choice.changes[k] * 2; });
      updateState(winChanges);
    } else {
      addLog(`🌟 支线:${choice.text} <strong style="color:#ff5252;">【赌输了,血本无归】</strong>`, "sidequest");
      const loseChanges = {};
      Object.keys(choice.changes).forEach(k => { loseChanges[k] = choice.changes[k] * 2; });
      updateState(loseChanges);
    }
  } else {
    updateState(choice.changes);
    addLog(`🌟 支线:${choice.text} (${choice.eff})`, "sidequest");
  }
  state.sideQuestsDone.push({ year: state.year, title: sq.title });
  state.pendingSideQuest = null;
  // 修复:支线完成后,如果本年主流程还没做,继续做
  if (!state._mainDone) {
    state.phase = "event";
    state.pendingEvent = EVENTS[state.era][state.round];
    renderEvent();
  } else {
    nextRound();
  }
};

window.nextRound = function() {
  state.round += 1;
  state.year += 1;
  state.age += 1;
  state._currentProject = null;
  state.pendingEvent = null;
  state._mainDone = false;
  clearGameArea();

  if (state.round >= 4) {
    state.era += 1;
    state.round = 0;
    if (state.era > 5) { finishGame(); return; }
    addLog(`🚪 <strong>时代切换 → ${ERAS[state.era-1].name}</strong>`);
    const era = ERAS[state.era - 1];
    if (era.gate) {
      const stat = state[era.gate.stat];
      // rating 数字越大越好 (新设计), political/aum 越大越好
      const isLowGood = (era.gate.stat === 'npl');
      const fail = isLowGood ? stat > era.gate.min : stat < era.gate.min;
      if (fail) {
        addLog(`⚠ 门控失败:${era.gate.fail}`);
        updateState({ political: -10, social: -5 });
        // 修复:门控失败 → 触发结局
        renderEnding({
          title: "🚪 时代门控失败",
          desc: era.gate.fail + "。你的 30 年银行路提前画上句号。52 岁的你回头看,这是当年最关键的一个数字没达标。"
        });
        return;
      } else {
        addLog(`✅ 门控通过:${era.gate.stat} 达标`);
      }
    }
  }
  // 时代 5 反腐
  if (state.era === 5 && state.political < 50 && Math.random() < 0.3) {
    addLog(`⚖️ <strong style="color:#ff5252;">【被查!】</strong>中纪委调查你,你被双规`, "sidequest");
    state.political = Math.max(0, state.political - 20);
  }
  if (state.health <= 20) { finishGame(); return; }
  if (state.political <= 10) { finishGame(); return; }
  if (state.family <= 20) { finishGame(); return; }
  checkSideQuest();
  if (state.phase === "sidequest") {
    renderSideQuest();
  } else {
    state.pendingEvent = EVENTS[state.era][state.round];
    renderEvent();
  }
};

function finishGame() {
  let ending;
  if (state.political <= 10) {
    ending = { title: "💔 金融反腐被查", desc: "2024 年你被中纪委带走。10 年间你贪了 500 万,现在写《忏悔录》。老婆跟你离了婚,孩子在同学面前抬不起头。" };
  } else if (state.health <= 20) {
    ending = { title: "💔 过劳病退", desc: "你的 Health 撑不到 2025。48 岁那年你突发心梗,提前病退。退休金 8000/月,医保报不完 ICU 费。" };
  } else if (state.family <= 20) {
    ending = { title: "💔 家人决裂", desc: "你错过了孩子的家长会,错过了父母的最后时光。52 岁那年你发现妻子已经签好了离婚协议。" };
  } else if (state.rating >= 6 && state.deposits >= 1000 && state.political >= 80) {
    ending = { title: "🏆 国有大行总行行长", desc: "你是国有大行总行行长,金融街大佬。你的名字出现在《财富》中国 50 位商界领袖榜单上。" };
  } else if (state.rating >= 5 && state.deposits >= 500) {
    ending = { title: "🌟 总行 VP", desc: "你是国有大行总行副总裁,身价 5000 万+,圈内有名。2024 年安全退休。" };
  } else if (state.rating >= 4 && state.deposits >= 100) {
    ending = { title: "🏠 股份制分行行长", desc: "你是招行/兴业/民生某省分行行长,地方金融王。52 岁退休,本地政协委员。" };
  } else if (state.deposits >= 50) {
    ending = { title: "🛋 稳定支行长", desc: "你一直在支行长位置,2025 退休,退休金 1.5 万/月。平凡而安全。" };
  } else if (state.rating <= 1 && state.political < 40) {
    ending = { title: "😢 35 岁被裁", desc: "2018 金融反腐,你被分流到郊区支行,2019 提前内退。52 岁你还在投简历,感叹时代抛弃你连招呼都不打。" };
  } else if (state.projectResults.filter(r => r.outcome.includes("failure")).length >= 5) {
    ending = { title: "🔒 隐藏·跳楼结局", desc: "5 次失败业务+监管处分+派系斗争,你 50 岁那年从办公楼 18 层跳下。银行给你开了追悼会,但谁也不敢说是'过劳'。" };
  } else {
    ending = { title: "😐 平平无奇", desc: "30 年就这样过去了。你没有大富大贵,也没有跌入谷底,只是……普通。" };
  }
  renderEnding(ending);
}

window.restart = function() {
  state = initState();
  document.getElementById("log").innerHTML = "";
  document.getElementById("log").style.display = "none";
  showIntro();
};

function showIntro() {
  document.getElementById("game-area").innerHTML = INTRO_HTML;
}

showIntro();
</script>
</body>
</html>
