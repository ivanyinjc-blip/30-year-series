// ==================== Fund 30 修复版 ====================
// 1) AUM 永远是 0 -> 初始 1.0 亿
// 2) side quest 完成后跳下一年 -> 先做本年主流程
// 3) 时代门控失败 -> 触发"卡死"结局
// 4) phase 状态混乱 -> 引入 _mainDone 标记
// 5) renderEvent 等用 insertAdjacentHTML 会累积 -> innerHTML 整体替换
// 6) returnRate 上下限 -> clamp
// 7) SIDE_QUESTS choices[].changes 字段为 undefined -> 0 兜底

function initState() {
  return {
    year: 1995, age: 22, round: 0, era: 1,
    aum: 1.0, returnRate: 0, rank: 50, mouseRisk: 0,
    health: 150, family: 150, social: 80,
    sideQuestsDone: [], projectResults: [],
    pendingEvent: null, pendingProject: null, _currentProject: null,
    pendingSideQuest: null,
    phase: "intro",
    _mainDone: false
  };
}
let state = initState();
window.state = state;

function updateState(changes) {
  if (!changes) return;
  Object.keys(changes).forEach(k => {
    if (changes[k] === undefined || changes[k] === null) return;
    state[k] = (state[k] || 0) + changes[k];
  });
  ['health','family','social'].forEach(k => {
    if (state[k] > 150) state[k] = 150;
    if (state[k] < 0) state[k] = 0;
  });
  if (state.aum < 0) state.aum = 0;
  if (state.mouseRisk < 0) state.mouseRisk = 0;
  if (state.mouseRisk > 100) state.mouseRisk = 100;
  if (state.rank < 1) state.rank = 1;
  if (state.rank > 100) state.rank = 100;
  if (state.returnRate < -80) state.returnRate = -80;
  if (state.returnRate > 200) state.returnRate = 200;
  if (typeof renderStats === 'function') renderStats();
}

function addLog(msg, cls) {
  const log = document.getElementById("log");
  log.style.display = "block";
  const div = document.createElement("div");
  if (cls) div.className = cls;
  div.innerHTML = msg;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function pick3(arr) {
  const copy = [...arr];
  const picked = [];
  for (let i = 0; i < 3 && copy.length; i++) {
    const idx = Math.floor(Math.random() * copy.length);
    picked.push(copy.splice(idx, 1)[0]);
  }
  return picked;
}

function rollOutcome(project) {
  const r = Math.random();
  if (r < project.rate) return { label: '\u{1F7E2} huge', mult: project.mult };
  if (r < project.rate + 0.3) return { label: '\u{1F535} moderate', mult: project.mult * 0.5 };
  if (r < project.rate + 0.55) return { label: '\u{1F7E1} breakeven', mult: 1 };
  return { label: '\u{1F534} failure', mult: 0.3 };
}

function applyOutcome(outcome, project) {
  const out = project.outs;
  if (outcome.label === '\u{1F7E2} huge') return out.huge;
  if (outcome.label === '\u{1F535} moderate') return out.moderate;
  if (outcome.label === '\u{1F7E1} breakeven') return out.breakeven;
  return out.failure;
}

function rankLabel(rank) {
  if (rank <= 5) return `\u{1F947}顶流(${rank})`;
  if (rank <= 20) return `\u{1F948}明星(${rank})`;
  if (rank <= 50) return `\u{1F949}中等(${rank})`;
  if (rank <= 80) return `⚠️中下(${rank})`;
  return `\u{1F480}垄底(${rank})`;
}

function renderStatsHtml() {
  return `
    <div class="stats-bar">
      <span class="year">\u{1F4C5} ${state.year} 年 · ${state.age} 岁 · 时代 ${state.era}/5 · 回合 ${state.round+1}/4${state.sideQuestsDone.length > 0 ? ' · 支线 ' + state.sideQuestsDone.length + '/5' : ''}</span><br>
      <span class="stat">\u{1F4B0} AUM: <strong>${state.aum.toFixed(1)}</strong> 亿</span> |
      <span class="stat">\u{1F4C8} 收益: <strong>${state.returnRate.toFixed(1)}</strong>%</span> |
      <span class="stat">\u{1F4CA} 排名: <strong>${rankLabel(state.rank)}</strong></span> |
      <span class="${state.mouseRisk >= 60 ? 'stat danger' : state.mouseRisk >= 30 ? 'stat warn' : 'stat'}">\u{1F42D} 老鼠仓: <strong>${state.mouseRisk}</strong></span><br>
      <span class="stat">❤️ Health: <strong>${state.health}</strong></span> |
      <span class="stat">\u{1F46A} Family: <strong>${state.family}</strong></span> |
      <span class="stat">\u{1F91D} Social: <strong>${state.social}</strong></span>
    </div>`;
}

function renderStats() {
  const gameArea = document.getElementById("game-area");
  if (!gameArea) return;
  const existing = gameArea.querySelector('.stats-bar');
  if (existing) existing.outerHTML = renderStatsHtml();
}

}

      <button class="btn" onclick="window.chooseIntensity('a')">A. 996 极限 — AUM +5 亿, Health-10, 老鼠仓+5</button>
      <button class="btn b" onclick="window.chooseIntensity('b')">B. 8h 平衡 — AUM +2 亿, Health-3</button>
      <button class="btn c" onclick="window.chooseIntensity('c')">C. 摆烂 — AUM -1 亿, Health+5, 老鼠仓-3</button>
    </div>
  `;
}

function renderResult(outcome, project) {
  clearGameArea();
  const cls = outcome.label === '\u{1F7E2} huge' ? 'good' : outcome.label === '\u{1F535} moderate' ? '' : outcome.label === '\u{1F7E1} breakeven' ? 'warn' : 'bad';
  document.getElementById("game-area").innerHTML = `
    ${renderStatsHtml()}
    <div class="result-card ${cls}">
      <h3>${outcome.label} · ${outcome.mult.toFixed(1)}x</h3>
      <p><strong>${project.name}</strong> (${project.real})</p>
      <p style="font-size:13px;color:#b2dfdb">${applyOutcome(outcome, project)}</p>
      <div style="font-size:12px;color:#80cbc4;margin-top:8px">
        \u{1F4B0} AUM: ${state.aum.toFixed(1)} 亿 | \u{1F4C8} 收益: ${state.returnRate.toFixed(1)}%<br>
        \u{1F4CA} 排名: ${rankLabel(state.rank)} | \u{1F42D} 老鼠仓: ${state.mouseRisk}
      </div>
      <button class="btn" onclick="window.nextRound()" style="margin-top:12px">下一回合 →</button>
    </div>
  `;
}

function renderSideQuest() {
  clearGameArea();
  const sq = state.pendingSideQuest;
  document.getElementById("game-area").innerHTML = `
    ${renderStatsHtml()}
    <div class="choice-card">
      <h3>${sq.title} <span style="font-size:11px;color:#ce93d8">\u{1F31F} 支线 ${state.sideQuestsDone.length+1}/5</span></h3>
      <p class="desc">${sq.desc}</p>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${sq.choices.map((c, i) => `<button class="btn" onclick="window.chooseSideQuest(${i})">${c.text}</button>`).join("")}
      </div>
      <div class="footer" style="font-size:11px;color:#80cbc4;margin-top:8px">
        ${sq.choices.map(c => `${c.text}: ${c.eff}`).join(" | ")}
      </div>
    </div>
  `;
}

function checkSideQuest() {
  const sq = SIDE_QUESTS.find(s => s.year === state.year && !state.sideQuestsDone.find(d => d.year === s.year));
  if (sq) {
    state.pendingSideQuest = sq;
    state.phase = "sidequest";
    return true;
  }
  state.phase = "event";
  return false;
}

window.startGame = function() {
  state = initState();
  window.state = state;
  document.getElementById("log").innerHTML = "";
  document.getElementById("log").style.display = "block";
  addLog("\u{1F4DC} 1995 年 · 你 22 岁,北大经院毕业,入申银万国研究部");
  checkSideQuest();
  if (state.phase === "sidequest") {
    renderSideQuest();
  } else {
    state.pendingEvent = EVENTS[1][0];
    state._mainDone = false;
    renderEvent();
  }
};

window.chooseEvent = function(key) {
  const ev = state.pendingEvent;
  const choice = ev[key];
  updateState({
    aum: choice.aum||0,
    returnRate: choice.returnRate||0,
    rank: choice.rank||0,
    mouseRisk: choice.mouseRisk||0,
    health: choice.health||0,
    family: choice.family||0,
    social: choice.social||0
  });
  addLog(`\u{1F4F0} 时代事件 → ${choice.text} (${choice.eff})`);
  state.pendingProject = pick3(PROJECTS[state.era]);
  state.phase = "project";
  renderProject();
};

window.chooseProject = function(idx) {
  const project = state.pendingProject[idx];
  state._currentProject = project;
  state.phase = "intensity";
  addLog(`\u{1F4BC} 选择了 ${project.name} (${project.real})`);
  renderIntensity();
};

window.chooseIntensity = function(key) {
  // 修复 #1: 用绝对增长 + 平衡 health 衰减
  let changes = {};
  if (key === 'a') changes = { aum: 5, health: -5, mouseRisk: 5 };
  else if (key === 'b') changes = { aum: 2, health: -2 };
  else changes = { aum: -1, health: 5, mouseRisk: -3 };
  updateState(changes);
  addLog(`⚙️ 投入度: ${key === 'a' ? '996 极限' : key === 'b' ? '8h 平衡' : '摆烂'}`);
  const project = state._currentProject;
  const outcome = rollOutcome(project);
  applyOutcomeToState(outcome, project);
  addLog(`\u{1F4CA} ${project.name} → ${outcome.label} · ${outcome.mult.toFixed(1)}x`, outcome.label === '\u{1F7E2} huge' ? 'l-good' : outcome.label === '\u{1F534} failure' ? 'l-bad' : '');
  state.projectResults.push({ year: state.year, project: project.name, real: project.real, outcome: outcome.label, mult: outcome.mult });
  state._mainDone = true;
  state.phase = "result";
  renderResult(outcome, project);
};

function applyOutcomeToState(outcome, project) {
  // 修复 #1: 用 max(1, aum) 作为基础
  const factor = outcome.mult / 5;
  const aumDelta = Math.max(1, state.aum) * factor * 0.3;
  updateState({ aum: aumDelta });
  updateState({ returnRate: (outcome.mult - 1) * 5 });
  // 调整 rank 变化幅度,避免门控过严
  if (outcome.label === '\u{1F7E2} huge') updateState({ rank: -5 });
  else if (outcome.label === '\u{1F535} moderate') updateState({ rank: 0 });
  else if (outcome.label === '\u{1F7E1} breakeven') updateState({ rank: 3 });
  else updateState({ rank: 5 });
}

window.chooseSideQuest = function(idx) {
  const sq = state.pendingSideQuest;
  const choice = sq.choices[idx];
  const c = choice.changes || {};
  updateState({
    aum: c.aum||0,
    returnRate: c.returnRate||0,
    rank: c.rank||0,
    mouseRisk: c.mouseRisk||0,
    health: c.health||0,
    family: c.family||0,
    social: c.social||0
  });
  addLog(`\u{1F31F} 支线:${choice.text} (${choice.eff})`, "l-side");
  state.sideQuestsDone.push({ year: state.year, title: sq.title });
  state.pendingSideQuest = null;
  // 修复 #2: 支线完成后,如果本年主流程还没做,继续做
  if (!state._mainDone) {
    state.phase = "event";
    state.pendingEvent = EVENTS[state.era][state.round];
    renderEvent();
  } else {
    nextRound();
  }
};

window.nextRound = function() {
  state.round += 1;
  state.year += 1;
  state.age += 1;
  state._currentProject = null;
  state.pendingEvent = null;
  state.pendingProject = null;
  state._mainDone = false;
  clearGameArea();

  if (state.round >= 4) {
    state.era += 1;
    state.round = 0;
    if (state.era > 5) {
      finishGame();
      return;
    }
    addLog(`\u{1F6AA} <strong>时代切换 → ${ERAS[state.era-1].name}</strong>`, "l-gold");
    const era = ERAS[state.era - 1];
    if (era.gate) {
      const stat = state[era.gate.stat];
      // rank 越低越好 (数字小=排名靠前), mouseRisk 越低越好, 其他越高越好
      const isLowGood = (era.gate.stat === 'rank' || era.gate.stat === 'mouseRisk');
      const fail = isLowGood ? stat > era.gate.min : stat < era.gate.min;
      if (fail) {
        addLog(`⚠ 门控失败:${era.gate.fail}`, "l-bad");
        updateState({ social: -5, family: -3 });
        // 修复 #3: 门控失败 → 触发结局
        renderEnding({
          title: "\u{1F6AA} 时代门控失败",
          desc: era.gate.fail + "。你的 30 年投资路提前画上句号。52 岁的你回头看,这是当年最关键的一个数字没达标。"
        });
        return;
      } else {
        addLog(`✅ 门控通过:${era.gate.stat} 达标`, "l-good");
      }
    }
  }

  if (state.era === 5 && state.mouseRisk >= 60 && Math.random() < 0.5) {
    addLog(`⚖️ <strong style="color:#ff5252;">【被查!】</strong>证监会立案,老鼠仓被查`, "l-bad");
    state.mouseRisk = Math.max(0, state.mouseRisk - 30);
    updateState({ family: -15, social: -10 });
  }

  if (state.health <= 20) { finishGame(); return; }
  if (state.family <= 20) { finishGame(); return; }
  if (state.mouseRisk >= 80 && state.era === 5) {
    finishGame();
    return;
  }

  checkSideQuest();
  if (state.phase === "sidequest") {
    renderSideQuest();
  } else {
    state.pendingEvent = EVENTS[state.era][state.round];
    renderEvent();
  }
};

function finishGame() {
  let ending;
  // 优先级: 健康/家庭先,然后老鼠仓被查,然后结局
  if (state.health <= 20) {
    ending = { title: "\u{1F494} 过劳突死", desc: "你的 Health 撑不到 2025。48 岁那年你突发心梗倒在交易室。同事发现你电脑还亮着,屏幕上是今日 AUM 净值曲线。" };
  } else if (state.family <= 20) {
    ending = { title: "\u{1F494} 家人决裂", desc: "你错过了孩子的家长会,错过了父母的最后时光。52 岁那年你发现妻子已经签好了离婚协议,孩子跟了她姓。" };
  } else if (state.mouseRisk >= 80) {
    ending = { title: "\u{1F494} 老鼠仓被查", desc: "证监会立案调查,你的 2002-2018 老鼠仓账户被翻出来。2024 年你被罚没 5000 万 + 刑拘 5 年。老婆跟你离了婚,孩子在同学面前抬不起头。" };
  } else if (state.rank <= 5 && state.aum >= 500 && state.mouseRisk <= 10) {
    ending = { title: "\u{1F3C6} 顶级私募大老", desc: "你是张磊/邱国鹿级大老,AUM 500 亿+,老鼠仓风险近零。2024 年你登上《财富》中国 40 位商界领袖榜单。" };
  } else if (state.rank <= 10 && state.aum >= 100) {
    ending = { title: "\u{1F31F} 明星公募基金经理", desc: "你是王亚伟级一哥,AUM 100 亿+,江湖人称'X 一哥'。2024 年管理规模超 200 亿,身价过亿。" };
  } else if (state.era === 5 && state.aum >= 50 && state.rank <= 30) {
    ending = { title: "\u{1F3E0} 量化私募创始人", desc: "你是幻方/九坤级大老,2024 年 DeepSeek 出圈后,你的 AI 量化产品 AUM 突破 50 亿。千万年薪 + 股权亿万身家。" };
  } else if (state.aum >= 100 && state.rank <= 30) {
    ending = { title: "\u{1F6CB}️ 银行理财子 / 养老 FOF 稳定", desc: "你从公募副总位置被挖到银行理财子,AUM 100 亿+,稳定年薪 500 万。52 岁退休,行业协会副会长。" };
  } else if (state.rank >= 80 && state.aum <= 1) {
    ending = { title: "\u{1F622} 排名垄底被清盘", desc: "2020 年公募清盘潮,你的产品被清盘。50 岁那年你被迫转型,去了一家小私募做合伙人。" };
  } else {
    ending = { title: "\u{1F31F} 投资圈中坚", desc: `30 年里你从研究员焖到了明星基金经理。AUM ${state.aum.toFixed(0)} 亿,排名 ${state.rank},健康 ${state.health}。52 岁的你正考虑退休还是二次创业。` };
  }
  state.phase = "ending";
  renderEnding(ending);
}

function renderEnding(ending) {
  state.phase = "ending";
  document.getElementById("game-area").innerHTML = `
    <div class="ending">
      <h2>${ending.title}</h2>
      <p>${ending.desc}</p>
      <hr>
      <p style="color:#80cbc4;font-size:13px">\u{1F4C5} ${state.year} 年 · ${state.age} 岁 · 30 年投资路</p>
      <p style="color:#80cbc4;font-size:13px">\u{1F4B0} AUM: ${state.aum.toFixed(1)} 亿 · 收益: ${state.returnRate.toFixed(1)}%</p>
      <p style="color:#80cbc4;font-size:13px">\u{1F4CA} 排名: ${rankLabel(state.rank)} · 老鼠仓: ${state.mouseRisk}</p>
      <p style="color:#80cbc4;font-size:13px">❤️ Health: ${state.health} · \u{1F46A} Family: ${state.family} · \u{1F91D} Social: ${state.social}</p>
      <p style="color:#80cbc4;font-size:13px">\u{1F31F} 完成支线: ${state.sideQuestsDone.length}/5</p>
      <p style="font-size:12px;color:#80cbc4;margin-top:10px">\u{1F4DC} 30 年足迹:<br>${state.projectResults.map(r => ` · ${r.year} ${r.project} (${r.real}) → ${r.outcome} x${r.mult.toFixed(1)} `).join("<br>")}</p>
      <button class="btn gold" onclick="window.startGame()">\u{1F504} 重新开始 30 年投资路</button>
    </div>
  `;
}

// 启动
document.getElementById("game-area").innerHTML = INTRO_HTML;
</script>
</body>
</html>
