function initState() {
  return {
    year: 1995, age: 22, round: 0, era: 1,
    reputation: 10, scoops: 0, reach: 0.5, income: 5,
    health: 100, family: 100, sources: 80,
    sideQuestsDone: [], projectResults: [],
    pendingEvent: null, pendingProject: null, _currentProject: null,
    pendingSideQuest: null, phase: "intro"
  };
}
let state = initState();

function updateState(changes) {
  Object.keys(changes).forEach(k => {
    state[k] = (state[k] || 0) + changes[k];
  });
  ['health','family','sources'].forEach(k => {
    if (state[k] > 100) state[k] = 100;
    if (state[k] < 0) state[k] = 0;
  });
  if (state.reputation < 0) state.reputation = 0;
  if (state.reputation > 100) state.reputation = 100;
  if (state.scoops < 0) state.scoops = 0;
  if (state.reach < 0) state.reach = 0;
  if (state.income < 0) state.income = 0;
}

function addLog(msg, cls) {
  const log = document.getElementById("log");
  log.style.display = "block";
  const div = document.createElement("div");
  if (cls) div.className = cls;
  div.innerHTML = msg;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function pick3(arr) {
  const copy = [...arr];
  const picked = [];
  for (let i = 0; i < 3 && copy.length; i++) {
    const idx = Math.floor(Math.random() * copy.length);
    picked.push(copy.splice(idx, 1)[0]);
  }
  return picked;
}

function rollOutcome(project) {
  const r = Math.random();
  if (r < project.rate) return { label: '🟢 huge', mult: project.mult };
  if (r < project.rate + 0.3) return { label: '🔵 moderate', mult: project.mult * 0.5 };
  if (r < project.rate + 0.55) return { label: '🟡 breakeven', mult: 1 };
  return { label: '🔴 failure', mult: 0.3 };
}

function applyOutcome(outcome, project) {
  const out = project.outs;
  if (outcome.label === '🟢 huge') return out.huge;
  if (outcome.label === '🔵 moderate') return out.moderate;
  if (outcome.label === '🟡 breakeven') return out.breakeven;
  return out.failure;
}

function repLabel(rep) {
  if (rep >= 80) return `🥇顶流(${rep})`;
  if (rep >= 60) return `🥈明星(${rep})`;
  if (rep >= 40) return `🥉中等(${rep})`;
  if (rep >= 20) return `⚠️中下(${rep})`;
  return `💀垫底(${rep})`;
}

function renderStats() {
  const statsHtml = `
    <div class="stats-bar">
      <span class="year">📅 ${state.year} 年 · ${state.age} 岁 · 时代 ${state.era}/5 · 回合 ${state.round+1}/4</span><br>
      <span class="stat">📰 Reputation: <strong>${repLabel(state.reputation)}</strong></span> |
      <span class="stat">📚 Scoops: <strong>${state.scoops}</strong></span> |
      <span class="stat">📡 Reach: <strong>${state.reach.toFixed(1)}</strong> 千万</span> |
      <span class="stat">💰 Income: <strong>${state.income.toFixed(0)}</strong> 万/年</span><br>
      <span class="stat">❤️ Health: <strong>${state.health}</strong></span> |
      <span class="stat">👪 Family: <strong>${state.family}</strong></span> |
      <span class="${state.sources >= 50 ? 'stat' : state.sources >= 20 ? 'stat warn' : 'stat danger'}">🕸️ Sources: <strong>${state.sources}</strong></span>
    </div>`;
  const gameArea = document.getElementById("game-area");
  const existing = gameArea.querySelector('.stats-bar');
  if (existing) existing.outerHTML = statsHtml;
  else gameArea.insertAdjacentHTML("afterbegin", statsHtml);
}

      <div class="footer" style="font-size:11px;color:#90caf9;margin-top:6px">A: ${ev.a.eff} | B: ${ev.b.eff}</div>

      ${projects.map((p, i) => `

    </div>

function renderResult(outcome, project) {
  renderStats();
  const cls = outcome.label === '🟢 huge' ? '' : outcome.label === '🔵 moderate' ? '' : outcome.label === '🟡 breakeven' ? 'warn' : 'bad';
  document.getElementById("game-area").insertAdjacentHTML("beforeend", `
    <div class="result-card ${cls}">
      <h3>${outcome.label} · ${outcome.mult.toFixed(1)}x</h3>
      <p><strong>${project.name}</strong> (${project.real})</p>
      <p style="font-size:13px;color:#bbdefb">${applyOutcome(outcome, project)}</p>
      <button class="btn" onclick="window.nextRound()">下一回合 →</button>
    </div>
  `);
}

function renderSideQuest() {
  renderStats();
  const sq = state.pendingSideQuest;
  document.getElementById("game-area").insertAdjacentHTML("beforeend", `
    <div class="choice-card">
      <h3>${sq.title}</h3>
      <p class="desc">${sq.desc}</p>
      ${sq.choices.map((c, i) => `<button class="btn" onclick="window.chooseSideQuest(${i})">${c.text}</button>`).join("")}
      <div class="footer" style="font-size:11px;color:#90caf9;margin-top:6px">
        ${sq.choices.map(c => `${c.text}: ${c.eff}`).join(" | ")}
      </div>
    </div>
  `);
}

function checkSideQuest() {
  const sq = SIDE_QUESTS.find(s => s.year === state.year && !state.sideQuestsDone.find(d => d.year === s.year));
  if (sq) {
    state.pendingSideQuest = sq;
    state.phase = "sidequest";
    return true;
  }
  return false;
}

window.startGame = function() {
  state = initState();
  document.getElementById("log").innerHTML = "";
  addLog("📜 1995 年 · 你 22 岁,人大新闻系毕业,入《财经时报》");
  checkSideQuest();
  if (state.phase === "sidequest") {
    document.getElementById("game-area").innerHTML = "";
    renderSideQuest();
  } else {
    document.getElementById("game-area").innerHTML = "";
    state.pendingEvent = EVENTS[1][0];
    renderEvent();
  }
};

window.chooseEvent = function(key) {
  const ev = state.pendingEvent;
  const choice = ev[key];
  updateState({ reputation: choice.reputation||0, scoops: choice.scoops||0, reach: choice.reach||0, income: choice.income||0, health: choice.health||0, family: choice.family||0, sources: choice.sources||0 });
  addLog(`📰 时代事件 → ${choice.text} (${choice.eff})`);
  state.pendingProject = pick3(PROJECTS[state.era]);
  renderProject();
};

window.chooseProject = function(idx) {
  const project = state.pendingProject[idx];
  state._currentProject = project;
  addLog(`💼 选择了 ${project.name} (${project.real})`);
  renderIntensity();
};

window.chooseIntensity = function(key) {
  let changes = {};
  if (key === 'a') changes = { reach: state.reach * 0.3, health: -10, family: -5 };
  else if (key === 'b') changes = { reach: state.reach * 0.1, health: -3, family: -2 };
  else changes = { reach: state.reach * -0.2, health: 5, family: 3 };
  updateState(changes);
  addLog(`⚙️ 投入度: ${key === 'a' ? '996 极限' : key === 'b' ? '8h 平衡' : '摆烂'}`);
  const project = state._currentProject;
  const outcome = rollOutcome(project);
  applyOutcomeToState(outcome, project);
  addLog(`📊 ${project.name} → ${outcome.label} · ${outcome.mult.toFixed(1)}x`, outcome.label === '🟢 huge' ? 'l-good' : outcome.label === '🔴 failure' ? 'l-bad' : '');
  state.projectResults.push({ year: state.year, project: project.name, real: project.real, outcome: outcome.label, mult: outcome.mult });
  renderResult(outcome, project);
};

function applyOutcomeToState(outcome, project) {
  const factor = outcome.mult / 5;
  updateState({ reach: state.reach * factor * 0.3, reputation: outcome.mult / 2 });
  if (outcome.label === '🟢 huge') {
    updateState({ scoops: 1, reputation: 10, sources: 3 });
  } else if (outcome.label === '🔵 moderate') {
    updateState({ reputation: 5 });
  } else if (outcome.label === '🟡 breakeven') {
    updateState({ reputation: -3 });
  } else {
    updateState({ reputation: -10, sources: -5 });
  }
}

window.chooseSideQuest = function(idx) {
  const sq = state.pendingSideQuest;
  const choice = sq.choices[idx];
  updateState({ reputation: choice.changes.reputation||0, scoops: choice.changes.scoops||0, reach: choice.changes.reach||0, income: choice.changes.income||0, health: choice.changes.health||0, family: choice.changes.family||0, sources: choice.changes.sources||0 });
  addLog(`🌟 支线:${choice.text} (${choice.eff})`, "l-side");
  state.sideQuestsDone.push({ year: state.year, title: sq.title });
  state.pendingSideQuest = null;
  document.getElementById("game-area").innerHTML = "";
  if (state.pendingEvent) {
    renderEvent();
  } else {
    nextRound();
  }
};

window.nextRound = function() {
  state.round += 1;
  state.year += 1;
  state.age += 1;
  state._currentProject = null;
  state.pendingEvent = null;
  state.pendingProject = null;
  document.getElementById("game-area").innerHTML = "";

  if (state.round >= 4) {
    state.era += 1;
    state.round = 0;
    if (state.era > 5) {
      finishGame();
      return;
    }
    addLog(`🚪 时代切换 → ${ERAS[state.era-1].name}`, "l-gold");
    const era = ERAS[state.era - 1];
    if (era.gate) {
      const stat = state[era.gate.stat];
      const isRank = era.gate.stat === 'rank';
      const fail = isRank ? stat > era.gate.min : stat < era.gate.min;
      if (fail) {
        addLog(`⚠ 门控失败:${era.gate.fail}`, "l-bad");
        updateState({ social: -5, family: -3 });
      } else {
        addLog(`✅ 门控通过:${era.gate.stat} 达标`, "l-good");
      }
    }
  }

  // 时代 5 监管严打 - Sources 过低 + Reach 过高有被公关风险
  if (state.era === 5 && state.sources <= 20 && state.reputation >= 60 && Math.random() < 0.3) {
    addLog(`💼 【被公关!】上市公司发律师函,你的核心信源被反查`, "l-bad");
    updateState({ reputation: -15, sources: -10, reach: -5 });
  }

  if (state.health <= 30) { finishGame(); return; }
  if (state.family <= 30) { finishGame(); return; }
  if (state.reputation <= 5) { finishGame(); return; }
  if (state.reach <= 0.5 && state.income <= 5) { finishGame(); return; }

  checkSideQuest();
  if (state.phase === "sidequest") {
    renderSideQuest();
  } else {
    state.pendingEvent = EVENTS[state.era][state.round];
    renderEvent();
  }
};

function finishGame() {
  let ending;
  if (state.reputation <= 5) {
    ending = { title: "💔 被公关退场", desc: "上市公司发律师函 + 微博公关稿,你被迫退场。50 岁的你去了一家小公司做 PR 顾问,月薪 8000。" };
  } else if (state.health <= 30) {
    ending = { title: "💔 过劳猝死", desc: "你的 Health 撑不到 2025。48 岁那年你突发心梗倒在编辑部。同事发现你电脑还亮着,屏幕上是今日稿件。" };
  } else if (state.family <= 30) {
    ending = { title: "💔 家人决裂", desc: "你错过了孩子的家长会,错过了父母的最后时光。52 岁那年你发现妻子已经签好了离婚协议,孩子跟了她姓。" };
  } else if (state.era === 5 && state.reputation >= 80 && state.reach >= 50) {
    ending = { title: "🏆 头部财经 IP", desc: "你是半佛/吴晓波级头部 IP,千万粉丝。2024 年你登上《财富》中国 40 位商界领袖榜单,千万佣金 + 投资亿万身家。" };
  } else if (state.reputation >= 90 && state.scoops >= 20) {
    ending = { title: "🌟 顶级财经记者", desc: "你是财新主编级大记者,行业顶尖。2024 年你依然在一线写稿,获中国新闻奖一等奖。圈内传说你某篇稿改过 17 遍。" };
  } else if (state.income >= 100 && state.scoops >= 10) {
    ending = { title: "🏠 财经作家", desc: "你转型财经作家,出书+专栏,影响一代读者。2024 年你的新书《30 年财经观察》销量破 50 万册。" };
  } else if (state.reputation >= 30 && state.sources >= 50) {
    ending = { title: "🛋 财经公关 / PR", desc: "你从记者转行做了大公司 IR/PR。年薪 80 万,52 岁退休,行业协会理事。" };
  } else if (state.reach <= 5 && state.income <= 30) {
    ending = { title: "😢 内容创业者没起来", desc: "2016 年辞职后公众号 / 视频号都没起来,50 岁的你还在接软文维持生计,月入 1-2 万。" };
  } else {
    ending = { title: "🌟 财经圈中坚", desc: `30 年里你从编辑助理做到机构副总。Reputation ${state.reputation},Scoops ${state.scoops},Reach ${state.reach.toFixed(0)} 千万。52 岁的你正考虑退休还是二次创业。` };
  }
  renderEnding(ending);
}

function renderEnding(ending) {
  document.getElementById("game-area").innerHTML = `
    <div class="ending">
      <h2>${ending.title}</h2>
      <p>${ending.desc}</p>
      <hr>
      <p style="color:#90caf9;font-size:13px">📅 ${state.year} 年 · ${state.age} 岁 · 30 年新闻路</p>
      <p style="color:#90caf9;font-size:13px">📰 Reputation: ${repLabel(state.reputation)} · 📚 Scoops: ${state.scoops}</p>
      <p style="color:#90caf9;font-size:13px">📡 Reach: ${state.reach.toFixed(1)} 千万 · 💰 Income: ${state.income.toFixed(0)} 万/年</p>
      <p style="color:#90caf9;font-size:13px">❤️ Health: ${state.health} · 👪 Family: ${state.family} · 🕸️ Sources: ${state.sources}</p>
      <p style="color:#90caf9;font-size:13px">🌟 完成支线: ${state.sideQuestsDone.length}/5</p>
      <p style="font-size:12px;color:#90caf9;margin-top:10px">📜 30 年足迹:<br>${state.projectResults.map(r => ` · ${r.year} ${r.project} (${r.real}) → ${r.outcome} x${r.mult.toFixed(1)} `).join("<br>")}</p>
      <button class="btn gold" onclick="window.startGame()">🔄 重新开始 30 年新闻路</button>
    </div>
  `);
}

document.getElementById("game-area").innerHTML = INTRO_HTML;
</script>
</body>
</html>
