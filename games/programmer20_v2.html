<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写代码的 20 年 · 程序员穿越</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
  color: #e8eaf6;
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 900px; margin: 0 auto; }
h1 {
  text-align: center;
  font-size: 32px;
  margin: 20px 0 8px;
  background: linear-gradient(90deg, #64ffda, #bb86fc, #ffd54f);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle { text-align: center; color: #9fa8da; margin-bottom: 30px; font-size: 14px; }

/* ====== 介绍页 ====== */
.intro-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(100,255,218,0.2);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 16px;
}
.intro-card h2 {
  color: #64ffda;
  font-size: 18px;
  margin-bottom: 12px;
  border-bottom: 1px dashed rgba(100,255,218,0.3);
  padding-bottom: 6px;
}
.intro-card p { line-height: 1.7; font-size: 14px; margin-bottom: 8px; }
.intro-card ul { padding-left: 22px; line-height: 1.8; font-size: 14px; }
.intro-card li { margin-bottom: 4px; }

.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 12px;
}
.stat-block {
  background: rgba(0,0,0,0.3);
  padding: 10px 12px;
  border-radius: 6px;
  border-left: 3px solid #64ffda;
}
.stat-block.soft { border-left-color: #ffd54f; }
.stat-block strong { color: #64ffda; display: block; margin-bottom: 4px; font-size: 13px; }
.stat-block.soft strong { color: #ffd54f; }
.stat-block span { font-size: 12px; color: #9fa8da; }

.ending-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 12px;
}
.ending-item {
  background: rgba(0,0,0,0.3);
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 13px;
  border-left: 3px solid #ffd54f;
}
.ending-item.hidden { border-left-color: #bb86fc; }
.ending-item.bad { border-left-color: #ff5252; }

.start-btn {
  display: block;
  width: 100%;
  margin: 24px 0 12px;
  padding: 16px;
  background: linear-gradient(90deg, #64ffda, #4dd0e1);
  color: #0a0e27;
  border: none;
  border-radius: 8px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.2s;
}
.start-btn:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(100,255,218,0.4); }

/* ====== 游戏中统计 ====== */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 16px;
}
.stat { text-align: center; }
.stat-label { font-size: 11px; color: #9fa8da; }
.stat-value { font-size: 20px; font-weight: bold; margin-top: 2px; }

.soft-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  background: rgba(255,255,255,0.03);
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 12px;
}
.soft-stat { text-align: center; }
.soft-bar {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  margin-top: 4px;
  overflow: hidden;
}
.soft-fill { height: 100%; transition: width 0.3s; }

.era-banner {
  background: linear-gradient(90deg, #5e35b1, #3949ab);
  padding: 14px 20px;
  border-radius: 8px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 16px;
}
.year-text { font-size: 13px; color: #b39ddb; margin-top: 4px; }

/* ====== 卡片 ====== */
.event-card, .project-card, .intensity-card, .sidequest-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(100,255,218,0.2);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}
.sidequest-card { border-color: rgba(187,134,252,0.4); background: rgba(187,134,252,0.05); }
.card-title {
  font-size: 13px;
  color: #64ffda;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.sidequest-card .card-title { color: #bb86fc; }
.card-desc { font-size: 15px; line-height: 1.5; margin-bottom: 12px; }

.choices { display: flex; flex-direction: column; gap: 8px; }
.choice {
  background: rgba(100,255,218,0.05);
  border: 1px solid rgba(100,255,218,0.3);
  border-radius: 6px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  color: #e8eaf6;
  font-size: 14px;
  font-family: inherit;
  line-height: 1.4;
}
.choice:hover:not(:disabled) {
  background: rgba(100,255,218,0.15);
  border-color: #64ffda;
  transform: translateX(4px);
}
.sidequest-card .choice { border-color: rgba(187,134,252,0.4); background: rgba(187,134,252,0.05); }
.sidequest-card .choice:hover { background: rgba(187,134,252,0.15); border-color: #bb86fc; }
.choice:disabled { opacity: 0.4; cursor: not-allowed; }
.choice-tag {
  display: inline-block;
  font-size: 11px;
  background: rgba(187,134,252,0.2);
  color: #bb86fc;
  padding: 2px 8px;
  border-radius: 10px;
  margin-right: 8px;
}
.choice-eff {
  display: block;
  font-size: 12px;
  color: #9fa8da;
  margin-top: 4px;
}

.log {
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  padding: 12px;
  max-height: 200px;
  overflow-y: auto;
  margin-top: 20px;
  font-family: monospace;
  font-size: 12px;
}
.log-entry { padding: 4px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); }
.log-year { color: #64ffda; font-weight: bold; }
.log-sidequest { color: #bb86fc; }

.ending-screen {
  background: linear-gradient(135deg, #311b92, #4a148c);
  padding: 40px;
  border-radius: 12px;
  text-align: center;
}
.ending-title { font-size: 32px; color: #ffd54f; margin-bottom: 16px; }
.ending-desc { font-size: 16px; line-height: 1.8; color: #e8eaf6; }
.ending-stats { margin-top: 20px; font-size: 14px; color: #b39ddb; }
.restart-btn {
  margin-top: 24px;
  padding: 12px 24px;
  background: #64ffda;
  color: #0a0e27;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}
.restart-btn:hover { background: #4dd0e1; }

.side-quest-badge {
  display: inline-block;
  background: rgba(187,134,252,0.3);
  color: #bb86fc;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 8px;
  letter-spacing: 1px;
}

@media (max-width: 600px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .ending-list { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: 1fr; }
}
</style>
</head>

function pick3(arr) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 3);
}

function updateState(changes) {
  if (!changes) return;
  if (changes.coding) state.coding = Math.max(0, Math.min(100, state.coding + changes.coding));
  if (changes.insight) state.insight = Math.max(0, Math.min(100, state.insight + changes.insight));
  if (changes.reputation) state.reputation = Math.max(0, Math.min(100, state.reputation + changes.reputation));
  if (changes.networth) state.networth = Math.max(0, state.networth + changes.networth);
  if (changes.health) state.health = Math.max(0, Math.min(100, state.health + changes.health));
  if (changes.family) state.family = Math.max(0, Math.min(100, state.family + changes.family));
  if (changes.social) state.social = Math.max(0, Math.min(100, state.social + changes.social));
  renderStats();
}

function renderStats() {
  document.getElementById("coding").textContent = state.coding;
  document.getElementById("insight").textContent = state.insight;
  document.getElementById("reputation").textContent = state.reputation;
  document.getElementById("networth").textContent = state.networth.toFixed(0);
  document.getElementById("health-val").textContent = state.health;
  document.getElementById("family-val").textContent = state.family;
  document.getElementById("social-val").textContent = state.social;
  const setBar = (id, v) => {
    const el = document.getElementById(id);
    el.style.width = v + "%";
    el.style.background = v > 60 ? "#64ffda" : v > 30 ? "#ffd54f" : "#ff5252";
  };
  setBar("health-bar", state.health);
  setBar("family-bar", state.family);
  setBar("social-bar", state.social);
}

function addLog(html, type = "") {
  state.log.push({ year: state.year, html, type });
  const logEl = document.getElementById("log");
  const prefix = type === "sidequest" ? '<span class="log-sidequest">🌟</span> ' : '';
  logEl.innerHTML = state.log.map(e => `<div class="log-entry"><span class="log-year">${e.year}</span> · ${e.type === 'sidequest' ? '<span class="log-sidequest">🌟</span> ' : ''}${e.html}</div>`).join("");
  logEl.scrollTop = logEl.scrollHeight;
}

function rollOutcome(project) {
  const r = Math.random();
  if (r < project.rate * 0.4) return { key: "huge", label: "🟢 hugeSuccess", text: project.outs.huge };
  if (r < project.rate) return { key: "moderate", label: "🔵 moderateSuccess", text: project.outs.moderate };
  if (r < project.rate + 0.3) return { key: "breakeven", label: "🟡 breakeven", text: project.outs.breakeven };
  return { key: "failure", label: "🔴 failure", text: project.outs.failure };
}

function applyOutcome(outcome, project) {
  let mult, effStr = "";
  if (outcome.key === "huge") { mult = project.mult; effStr = `💰 Net Worth x${mult}`; state.networth *= mult; }
  else if (outcome.key === "moderate") { mult = project.mult * 0.5; effStr = `💰 Net Worth x${mult.toFixed(1)}`; state.networth *= mult; }
  else if (outcome.key === "breakeven") { mult = 1; effStr = `💰 Net Worth 持平`; }
  else { mult = 0.3; effStr = `💰 Net Worth x0.3 (亏损)`; state.networth *= 0.3; }
  state.projectResults.push({ year: state.year, project: project.name, real: project.real, outcome: outcome.label, mult });
  return effStr;
}

window.chooseEvent = function(key) {
  const ev = state.pendingEvent;
  const choice = ev[key];
  updateState({ coding: choice.coding, insight: choice.insight, reputation: choice.reputation, networth: choice.networth, health: choice.health, family: choice.family, social: choice.social });
  addLog(`📰 时代事件 → <strong>${choice.text}</strong> (${choice.eff})`);
  state.pendingProject = pick3(PROJECTS[state.era]);
  renderProject();
};

};

  if (key === 'a') changes = { coding: 8, health: -8, family: -3, social: -3 };
  if (key === 'b') changes = { coding: 3, health: -2 };
  if (key === 'c') changes = { coding: 1, health: 5, family: 3, reputation: -2 };
  updateState(changes);
  addLog(`⚙️ 投入度: ${key === 'a' ? '996 极限' : key === 'b' ? '8h 平衡' : '摆烂'}`);
  const project = state._currentProject;
  const outcome = rollOutcome(project);
  const effStr = applyOutcome(outcome, project);
  addLog(`📊 <strong>${project.name}</strong> → ${outcome.label} · ${effStr}`);
  renderResult(outcome, project);
};

window.chooseSideQuest = function(idx) {
  const sq = state.pendingSideQuest;
  const choice = sq.choices[idx];
  // 处理赌博选项
  if (choice.gamble) {
    const won = Math.random() < 0.5;
    if (won) {
      addLog(`🌟 支线:${choice.text} <strong style="color:#64ffda;">【赌赢了!】</strong>`, "sidequest");
      // 翻倍
      const winChanges = {};
      Object.keys(choice.changes).forEach(k => { winChanges[k] = choice.changes[k] * 2; });
      updateState(winChanges);
    } else {
      addLog(`🌟 支线:${choice.text} <strong style="color:#ff5252;">【赌输了,血本无归】</strong>`, "sidequest");
      // 损失翻倍
      const loseChanges = {};
      Object.keys(choice.changes).forEach(k => { loseChanges[k] = choice.changes[k] * 2; });
      updateState(loseChanges);
    }
  } else {
    updateState(choice.changes);
    addLog(`🌟 支线:${choice.text} (${choice.eff})`, "sidequest");
  }
  state.sideQuestsDone.push({ year: state.year, title: sq.title });
  state.pendingSideQuest = null;
  // 支线完成后,进入当前时代事件(如果还没做)
  if (state.pendingEvent) {
    renderEvent();
  } else {
    nextRound();
  }
};

function checkSideQuest() {
  // 找到当前 year 对应的支线
  const sq = SIDE_QUESTS.find(s => s.year === state.year && !state.sideQuestsDone.find(d => d.year === s.year));
  if (sq) {
    state.pendingSideQuest = sq;
    state.phase = "sidequest";
  }
}

window.nextRound = function() {
  state.round += 1;
  state.year += 1;
  state.age += 1;
  state._currentProject = null;
  state.pendingEvent = null;

  // 时代切换
  if (state.round >= 4) {
    state.era += 1;
    state.round = 0;
    if (state.era > 5) {
      finishGame();
      return;
    }
    updateState({ coding: -10 });
    addLog(`🚪 <strong>时代切换 → ${ERAS[state.era-1].name}</strong> · Coding -10`);
    const era = ERAS[state.era - 1];
    if (era.gate) {
      const stat = state[era.gate.stat];
      if (stat < era.gate.min) {
        addLog(`⚠ 门控失败:${era.gate.fail}`);
        updateState({ reputation: -10, networth: -20 });
      } else {
        addLog(`✅ 门控通过:${era.gate.stat}=${stat} ≥ ${era.gate.min}`);
      }
    }
  }
  // 健康崩盘检查
  if (state.health <= 30) { finishGame(); return; }
  // 检查支线
  checkSideQuest();
  if (state.phase === "sidequest") {
    renderSideQuest();
  } else {
    state.pendingEvent = EVENTS[state.era][state.round];
    renderEvent();
  }
};

function finishGame() {
  let ending;
  if (state.reputation >= 90 && state.coding >= 90) {
    ending = { title: "🔒 隐藏结局:开源先驱", desc: "你成为顶级开源 maintainer,你的代码被全球开发者使用,被写进技术史。" };
  } else if (state.projectResults.filter(r => r.outcome.includes("failure")).length >= 5) {
    ending = { title: "🔒 隐藏结局:创业失败", desc: "5 次失败项目,52 岁还在打零工,同学们聚会时你总是提前离开。" };
  } else if (state.health <= 30) {
    ending = { title: "💔 过劳病退结局", desc: "你的 Health 撑不到 2025。40 岁那年,你被诊断出重度焦虑 + 失眠,提前退休了。" };
  } else if (state.family <= 30) {
    ending = { title: "💔 家人决裂结局", desc: "你错过了孩子的成长,错过了父母的最后时光。52 岁那年,你和家人形同陌路。" };
  } else if (state.reputation >= 80 && state.networth >= 5000) {
    ending = { title: "🏆 科技大佬结局", desc: "你是上市公司的 CTO,写了一本《我的 30 年技术人生》,被业内称为传奇。" };
  } else if (state.reputation >= 70 && state.coding >= 80) {
    ending = { title: "🌟 高级专家结局", desc: "你是阿里 P9 / Google L8,业内有名的技术专家,你的演讲场场爆满。" };
  } else if (state.networth >= 500 && state.health >= 60) {
    ending = { title: "🏠 稳定中产结局", desc: "你在大厂混到 P8,买房买车,孩子上国际学校,52 岁开始考虑提前退休。" };
  } else if (state.reputation >= 50 && state.networth >= 200) {
    ending = { title: "🛋 自由职业结局", desc: "你 40 岁那年离开大厂,做独立顾问,远程工作,周游世界。" };
  } else if (state.coding < 40 && state.reputation < 40) {
    ending = { title: "😢 35 岁被裁结局", desc: "2023 年互联网大裁员,你被优化。52 岁还在投简历,感叹时代抛弃你连招呼都不打。" };
  } else {
    ending = { title: "😐 平平无奇结局", desc: "30 年就这样过去了。你没有大富大贵,也没有跌入谷底,只是……普通。" };
  }
  renderEnding(ending);
}

window.restart = function() {
  state = {
    era: 1, round: 0, year: 1995, age: 22,
    coding: 30, insight: 20, reputation: 10, networth: 5,
    health: 100, family: 100, social: 80,
    log: [], projectResults: [], sideQuestsDone: [],
    phase: "intro", pendingEvent: null, pendingProject: null, pendingSideQuest: null
  };
  document.getElementById("log").innerHTML = "";
  document.getElementById("log").style.display = "none";
  showIntro();
};

function showIntro() {
  document.getElementById("game-area").innerHTML = INTRO_HTML;
}

showIntro();
</script>
